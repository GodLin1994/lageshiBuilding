<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FF14 LaGeshi团队团建生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }
        body {
            background: url("https://picsum.photos/id/1005/1920/1080") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            padding: 10px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            margin-bottom: 10px;
        }
        .header p {
            font-size: 15px;
            color: #e0e0e0;
            line-height: 1.4;
        }
        .section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .section-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
        }
        .raid-dungeon {
            text-align: center;
            font-size: 16px;
            color: #ffd700;
            background: rgba(255,215,0,0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,215,0,0.25);
        }
        .dungeon-select-wrap {
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);

        }

            border-radius: 6px;

        }
        .player-input select option {

        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;

        }
        #generateBtn {

            max-width: 200px;
            padding: 14px 20px;

        #resetBtn {

        }

            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .player-list {

        .rank-wrap {

            border-radius: 6px;
        }

            .team-grid { grid-template-columns: repeat(2, 1fr); }

</head>

                职业分配规则：防护/治疗/DPS智能转职，通畅度按职能转职逻辑智能推算并给出原因分析

    <script>
        const dungeonList = [
            "艳翼蛇鸟歼殛战","佐拉加歼殛战","泽莲尼娅歼殛战","永恒女王歼殛战",
            "永远之暗悲惶歼殛战","格莱杨拉波尔歼殛战","恩欧歼殛战",
            "M1S","M2S","M3S","M4S","M5S","M6S","M7S","M8S","M9S","M10S","M11S","M12S",
            "巴哈姆特绝境战","究极神兵绝境战","亚历山大绝境战","幻想龙诗绝境战",
            "欧米茄绝境验证战","光暗未来绝境战","妖星乱舞绝境战"
        ];

        const fixedJobs = {
            tank: ['骑士', '战士', '暗黑骑士', '绝枪战士'],
            healer: ['白魔法师', '占星术士', '贤者', '学者'],
            dps_melee: ['武士', '武僧', '忍者', '蝰蛇剑士', '龙骑士', '钐镰客'],
            dps_ranged: { group1: ['吟游诗人', '舞者', '机工士'], group2: ['绘灵法师', '黑魔法师', '召唤师', '赤魔法师'] }
        };

        // 职能大类映射
        function getJobType(jobName){
            if(fixedJobs.tank.includes(jobName)) return 'tank';
            if(fixedJobs.healer.includes(jobName)) return 'healer';
            if(fixedJobs.dps_melee.includes(jobName)) return 'dps';
            return 'dps';
        }

        // 按转职逻辑计算通畅度 + 分析理由
        function calcSmoothRate(fromType, toType){
            let base = 0, min, max, reason = "";

            // 规则：
            // 防护 → DPS：高
            // DPS → 防护/治疗：低
            // 治疗 → 防护：高
            // 防护 → 治疗：低
            // 同类型：中等

            if(fromType === 'tank'){
                if(toType === 'dps'){
                    min = 75; max = 95;
                    reason = "防护转输出职能，操作逻辑相近，Lashi适配度高";
                }else if(toType === 'healer'){
                    min = 20; max = 45;
                    reason = "防护转治疗职能，手法节奏差异大，Lashi通畅度偏低";
                }else{
                    min = 50; max = 70;
                    reason = "同职能转职，适配度中等";
                }
            }
            else if(fromType === 'dps'){
                if(toType === 'tank' || toType === 'healer'){
                    min = 15; max = 40;
                    reason = "输出转坦/治疗，责任与操作逻辑跨度大，Lashi很难适应";
                }else{
                    min = 55; max = 75;
                    reason = "输出内部转职，玩法相近，通畅度中等偏上";
                }
            }
            else if(fromType === 'healer'){
                if(toType === 'tank'){
                    min = 70; max = 90;
                    reason = "治疗转防护，大局意识相通，Lashi适配流畅";
                }else if(toType === 'dps'){
                    min = 40; max = 65;
                    reason = "治疗转输出，节奏变化较大，通畅度一般";
                }else{
                    min = 50; max = 70;
                    reason = "同治疗职能转职，适配度中等";
                }
            }

            let rate = Math.floor(Math.random()*(max-min+1)) + min;
            return { rate, reason };
        }

        const INPUT_KEY = "FF14_TEAM_INPUT_DATA";

        function saveInputToLocal(){
            let data = {
                dungeon: document.getElementById('dungeonSelect').value,
                players: []
            };
            for(let i=1; i<=8; i++){
                data.players.push({
                    name: document.getElementById(`player${i}Name`).value,
                    job: document.getElementById(`player${i}Job`).value
                });
            }
            localStorage.setItem(INPUT_KEY, JSON.stringify(data));
        }

        function loadInputFromLocal(){
            let data = localStorage.getItem(INPUT_KEY);
            if(!data) return;
            data = JSON.parse(data);
            document.getElementById('dungeonSelect').value = data.dungeon || '';
            data.players.forEach((p, i)=>{
                let n = i+1;
                if(document.getElementById(`player${n}Name`)){
                    document.getElementById(`player${n}Name`).value = p.name || '';
                    document.getElementById(`player${n}Job`).value = p.job || '';
                }
            });
        }

        function bindAutoSave(){
            document.getElementById('dungeonSelect').addEventListener('change', saveInputToLocal);
            for(let i=1; i<=8; i++){
                document.getElementById(`player${i}Name`).addEventListener('input', saveInputToLocal);
                document.getElementById(`player${i}Job`).addEventListener('change', saveInputToLocal);
            }
        }

        function getFinalDungeon(){
            const v = document.getElementById('dungeonSelect').value.trim();
            return v || dungeonList[Math.floor(Math.random() * dungeonList.length)];
        }

        function shuffleArray(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getUniqueFixedJobs(list, count) {
            return shuffleArray(list).slice(0, count);
        }

        function getJobText(k) {
            const m = {tank:'防护（T）',healer:'治疗（H）',dps_melee:'近战DPS',dps_ranged:'远程DPS'};
            return m[k]||k;
        }

        function collectPlayers() {
            let ps = [];
            for(let i=1;i<=8;i++){
                const n = document.getElementById(`player${i}Name`).value.trim();
                const j = document.getElementById(`player${i}Job`).value;
                if(!n || !j) return null;
                ps.push({name:n, originalJob:j, originalJobText:getJobText(j)});
            }
            return ps;
        }

        function assignJobs(players) {
            const res = {tank:[],healer:[],dps_melee:[],dps_ranged:[]};
            const used = new Set();
            const sp = shuffleArray(players);

            const tj = getUniqueFixedJobs(fixedJobs.tank,2);
            assign('tank',tj,sp,res,used);

            const hj = getUniqueFixedJobs(fixedJobs.healer,2);
            assign('healer',hj,sp,res,used);

            const mj = getUniqueFixedJobs(fixedJobs.dps_melee,2);
            assign('dps_melee',mj,sp,res,used);

            const rj = [shuffleArray(fixedJobs.dps_ranged.group1)[0]];
            let g2;
            do{g2=shuffleArray(fixedJobs.dps_ranged.group2)[0]}while(used.has(g2));
            rj.push(g2);
            assign('dps_ranged',rj,sp,res,used);

            return res;
        }

        function assign(t,list,p,res,used){
            let c=0;
            const av = p.filter(x=>x.originalJob!==t);
            const sa = shuffleArray(av);
            for(const j of list){
                if(c>=list.length)break;
                const tar = sa.find(x=>!Object.values(res).flat().some(m=>m.name===x.name));
                if(tar){
                    tar.newJob = j;
                    tar.newJobType = t === 'tank' ? 'tank' : t === 'healer' ? 'healer' : 'dps';
                    tar.fromType = tar.originalJob === 'tank' ? 'tank' 
                                 : tar.originalJob === 'healer' ? 'healer' : 'dps';
                    // 计算通畅度和理由
                    let smooth = calcSmoothRate(tar.fromType, tar.newJobType);
                    tar.smoothRate = smooth.rate;
                    tar.smoothReason = smooth.reason;

                    res[t].push(tar);
                    used.add(j);
                    c++;
                }
            }
        }

        // 渲染排行
        function renderRank(allPlayer){
            let box = document.getElementById('rankBox');
            box.innerHTML = '';
            // 降序排序
            let sortList = allPlayer.sort((a,b)=>b.smoothRate - a.smoothRate);
            sortList.forEach((p,idx)=>{
                let item = document.createElement('div');
                item.className = 'rank-item';
                item.innerHTML = `第${idx+1}名：${p.name} — ${p.smoothRate}% | ${p.smoothReason}`;
                box.appendChild(item);
            });
        }

        function renderTeam(res){
            document.getElementById('raidDungeon').innerText = '本次挑战副本：'+getFinalDungeon();
            // 合并所有玩家用于排行
            let all = [...res.tank,...res.healer,...res.dps_melee,...res.dps_ranged];

            function r(id,dt,t){
                const el=document.getElementById(id);el.innerHTML='';
                dt.forEach(p=>{
                    const li=document.createElement('li');li.className='player-item';
                    let colorClass = p.smoothRate >=70 ? 'smooth-high' : p.smoothRate >=40 ? 'smooth-mid' : 'smooth-low';
                    li.innerHTML=`
                        <span>${p.name}</span>
                        <span>原职能：${p.originalJobText} → 新职能：${t}（${p.newJob}）</span>
                        <span class="${colorClass}">Lashi通畅度预测：${p.smoothRate}%</span>
                        <span>分析：${p.smoothReason}</span>
                    `;
                    el.appendChild(li);
                });
            }
            r('tankList',res.tank,'防护');
            r('healerList',res.healer,'治疗');
            r('meleeList',res.dps_melee,'近战DPS');
            r('rangedList',res.dps_ranged,'远程DPS');

            // 渲染排行榜
            renderRank(all);
        }

        function resetAll(){
            localStorage.removeItem(INPUT_KEY);
            document.getElementById('dungeonSelect').value = '';
            for(let i=1;i<=8;i++){
                document.getElementById(`player${i}Name`).value='';
                document.getElementById(`player${i}Job`).value='';
            }
            document.getElementById('errorTip').style.display='none';
            document.getElementById('teamResult').style.display='none';
            document.getElementById('raidDungeon').innerText='本次挑战副本：--';
            document.getElementById('rankBox').innerHTML = '';
        }

        window.onload = function(){
            loadInputFromLocal();
            bindAutoSave();

            document.getElementById('generateBtn').onclick = ()=>{
                const ps = collectPlayers();
                if(!ps){
                    document.getElementById('errorTip').style.display='block';
                    return;
                }
                document.getElementById('errorTip').style.display='none';
                const teamRes = assignJobs(ps);
                renderTeam(teamRes);
                document.getElementById('teamResult').style.display='block';
            };

            document.getElementById('resetBtn').onclick = resetAll;
        };
    </script>
</body>
</html>
