<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }
        body {
            background: url("https://picsum.photos/id/1005/1920/1080") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            padding: 10px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            margin-bottom: 10px;
        }
        .header p {
            font-size: 15px;
            color: #e0e0e0;
            line-height: 1.4;
        }
        .section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .section-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
        }
        .raid-dungeon {
            text-align: center;
            font-size: 16px;
            color: #ffd700;
            background: rgba(255,215,0,0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,215,0,0.25);
        }
        .dungeon-select-wrap {
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
        }
        .dungeon-select-wrap label {
            font-size: 14px;
            color: #ffd700;
            width: 70px;
            flex-shrink: 0;
        }
        #dungeonSelect {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 13px;
            outline: none;
            min-width: 0;
        }
        #dungeonSelect option {
            background: #333;
            color: #fff;
            font-size: 13px;
        }
        .player-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .player-input {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            flex-wrap: wrap;
        }
        .player-input label {
            font-size: 14px;
            color: #ffd700;
            width: 60px;
            flex-shrink: 0;
        }
        .player-input input {
            flex: 1;
            min-width: 100px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.6) !important;
            color: #fff !important;
            font-size: 13px;
            outline: none;
        }
        .player-input select {
            padding: 8px 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.6) !important;
            color: #fff !important;
            font-size: 13px;
            outline: none;
        }
        .player-input select option {
            background: #333 !important;
            color: #fff !important;
            font-size: 13px;
        }
        input:-webkit-autofill,
        select:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6) inset !important;
            -webkit-text-fill-color: #fff !important;
            transition: background-color 5000s ease-in-out 0s !important;
        }
        ::-webkit-input-placeholder { color: #ccc; }
        :-moz-placeholder { color: #ccc; }
        ::-moz-placeholder { color: #ccc; }
        :-ms-input-placeholder { color: #ccc; }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        #generateBtn {
            flex: 1;
            max-width: 200px;
            padding: 14px 20px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #generateBtn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }
        #resetBtn {
            flex: 1;
            max-width: 200px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #saveImgBtn {
            flex: 1;
            max-width: 200px;
            padding: 14px 20px;
            background: linear-gradient(135deg, #4cd964, #5ac8fa);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #resetBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .team-result {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .team-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .job-group {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .job-group-title {
            font-size: 18px;
            color: #ffd700;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 12px;
        }
        .player-list {
            list-style: none;
        }
        .player-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .player-item span:first-child {
            font-weight: bold;
            color: #ffd700;
        }
        .smooth-high { color: #4cd964; font-weight:bold; }
        .smooth-mid { color: #ffcc00; font-weight:bold; }
        .smooth-low { color: #ff3b30; font-weight:bold; }
        .rank-wrap {
            margin-top:20px;
            padding:15px;
            background:rgba(255,215,0,0.08);
            border-radius:8px;
            border:1px solid rgba(255,215,0,0.2);
        }
        .rank-item {
            padding:6px 0;
            font-size:14px;
            border-bottom:1px solid rgba(255,255,255,0.1);
        }
        .title-1{background:linear-gradient(90deg,#ffd700,#fff176);-webkit-background-clip:text;color:transparent;font-weight:bold;}
        .title-2{background:linear-gradient(90deg,#c0c0c0,#e5e5e5);-webkit-background-clip:text;color:transparent;font-weight:bold;}
        .title-3{background:linear-gradient(90deg,#cd7f32,#ffb380);-webkit-background-clip:text;color:transparent;font-weight:bold;}
        .title-4{background:linear-gradient(90deg,#42a5f5,#64b5f6);-webkit-background-clip:text;color:transparent;font-weight:bold;}
        .title-5{background:linear-gradient(90deg,#7e57c2,#b39ddb);-webkit-background-clip:text;color:transparent;font-weight:bold;}

        .title-7{background:linear-gradient(90deg,#ef5350,#ff8a65);-webkit-background-clip:text;color:transparent;font-weight:bold;}
        .title-8{background:linear-gradient(90deg,#666,#aaa);-webkit-background-clip:text;color:transparent;font-weight:bold;}
        .tip {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 15px;
            line-height: 1.4;
        }
        .error-tip {
            text-align: center;
            font-size: 15px;
            color: #e74c3c;
            margin: 12px 0;
            display: none;
            padding: 10px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 6px;
        }
        /* 截图区域专用样式 - 修复文字看不清 */
        #captureWrap {
            background: #000000; /* 纯黑实底，保证文字绝对清晰 */
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #ffd700;
        }
        .preview-img-wrap {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        #previewImg {
            max-width: 100%;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 8px;
        }
        .save-tip {
            font-size: 13px;
            color: #4cd964;
            margin-top: 8px;
        }
        @media (min-width: 768px) {
            .team-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

            ranged: "远程DPS"
        };
        function calcSmoothRateWithSub(mainType, subType, toType){
            let baseMin = 0, baseMax = 0;
            let subBonus = 0;
            let reason = "";
            const realSubType = subType || mainType;
            if(mainType === 'tank'){
                if(toType === 'dps' || toType === 'ranged'){
                    baseMin = 75; baseMax = 95;
                    reason = "主职防护转输出，基础适配度高";
                }else if(toType === 'healer'){
                    baseMin = 15; baseMax = 40;
                    reason = "主职防护转治疗，职责与节奏差异极大，适配度低";
                }
            }
            else if(mainType === 'dps'){
                if(toType === 'tank' || toType === 'healer'){
                    baseMin = 15; baseMax = 40;
                    reason = "主职近战转坦/治疗，跨度大基础偏低";
                }else if(toType === 'ranged'){
                    baseMin = 55; baseMax = 75;
                    reason = "近战转远程，同输出适配中等偏上";
                }
            }
            else if(mainType === 'ranged'){
                if(toType === 'tank' || toType === 'healer'){
                    baseMin = 15; baseMax = 40;
                    reason = "主职远程转坦/治疗，跨度大基础偏低";
                }else if(toType === 'dps'){
                    baseMin = 55; baseMax = 75;
                    reason = "远程转近战，同输出适配中等偏上";
                }
            }
            else if(mainType === 'healer'){
                if(toType === 'tank'){
                    baseMin = 15; baseMax = 40;
                    reason = "主职治疗转防护，职责与操作逻辑差异极大，适配度低";
                }else if(toType === 'dps' || toType === 'ranged'){
                    baseMin = 40; baseMax = 65;
                    reason = "主职治疗转输出，节奏变化较大";
                }
            }
            if(realSubType === toType){
                subBonus = Math.floor(Math.random() * 6) + 10;
                reason += `；副职匹配当前职能，熟练度加分`;
            }else if(realSubType !== mainType){
                subBonus = Math.floor(Math.random() * 4);
                reason += `；副职为${roleMap[realSubType]}，小幅辅助适配`;
            }else{
                reason += "；无副职差异，仅按主职推算";
            }
            let raw = Math.floor(Math.random() * (baseMax - baseMin + 1)) + baseMin;
            let final = Math.min(100, raw + subBonus);
            return { rate: final, reason };
        }
        const INPUT_KEY = "FF14_TEAM_FULL_DATA";
        function saveInputToLocal(){
            let data = {
                dungeon: document.getElementById('dungeonSelect').value,
                players: []
            };
            for(let i=1;i<=8;i++){
                data.players.push({
                    name: document.getElementById(`p${i}Name`).value,
                    main: document.getElementById(`p${i}Main`).value,
                    sub: document.getElementById(`p${i}Sub`).value
                });
            }
            localStorage.setItem(INPUT_KEY, JSON.stringify(data));
        }
        function loadInputFromLocal(){
            let d = localStorage.getItem(INPUT_KEY);
            if(!d) return;
            let data = JSON.parse(d);
            document.getElementById('dungeonSelect').value = data.dungeon || '';
            data.players.forEach((p,idx)=>{
                let i = idx+1;
                if(document.getElementById(`p${i}Name`)){
                    document.getElementById(`p${i}Name`).value = p.name || '';
                    document.getElementById(`p${i}Main`).value = p.main || '';
                    document.getElementById(`p${i}Sub`).value = p.sub || '';
                }
            });
        }
        function bindAutoSave(){
            document.getElementById('dungeonSelect').addEventListener('change', saveInputToLocal);
            for(let i=1;i<=8;i++){
                document.getElementById(`p${i}Name`).addEventListener('input', saveInputToLocal);
                document.getElementById(`p${i}Main`).addEventListener('change', saveInputToLocal);
                document.getElementById(`p${i}Sub`).addEventListener('change', saveInputToLocal);
            }
        }
        function getFinalDungeon(){
            const v = document.getElementById('dungeonSelect').value.trim();
            return v || dungeonList[Math.floor(Math.random() * dungeonList.length)];
        }
        function shuffleArray(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        function getValidRoleList(playerMain){
            return ['tank','healer','dps','ranged'].filter(r => r !== playerMain);
        }
        function assignJobs(players) {
            const res = {tank:[],healer:[],dps:[],ranged:[]};
            let pool = shuffleArray([...players]);
            for(let p of pool){
                if(res.tank.length >= 2) break;
                if(p.mainType !== 'tank') res.tank.push(p);
            }
            for(let p of pool){
                if(res.healer.length >= 2) break;
                if(p.mainType !== 'healer' && !res.tank.includes(p)) res.healer.push(p);
            }
            for(let p of pool){
                if(res.dps.length >= 2) break;
                if(p.mainType !== 'dps' && !res.tank.includes(p) && !res.healer.includes(p)) res.dps.push(p);
            }
            for(let p of pool){
                if(res.ranged.length >= 2) break;
                if(!res.tank.includes(p) && !res.healer.includes(p) && !res.dps.includes(p)) res.ranged.push(p);
            }
            const fillRole = (list, roleKey) => {
                const jobList = shuffleArray(fixedJobs[roleKey]);
                list.forEach((p, idx) => {
                    p.newJob = jobList[idx % jobList.length];
                    p.newJobType = roleKey;
                    let score = calcSmoothRateWithSub(p.mainType, p.subType, roleKey);
                    p.smoothRate = score.rate;
                    p.smoothReason = score.reason;
                    p.mainText = roleMap[p.mainType];
                    p.subText = p.subType ? roleMap[p.subType] : '无（同主职）';
                });
            };
            fillRole(res.tank, 'tank');
            fillRole(res.healer, 'healer');
            fillRole(res.dps, 'dps');
            fillRole(res.ranged, 'ranged');
            return res;
        }
        function renderRank(allPlayer){
            let box = document.getElementById('rankBox');
            box.innerHTML = '';
            let sortList = allPlayer.sort((a,b)=>b.smoothRate - a.smoothRate);
            sortList.forEach((p,idx)=>{
                let item = document.createElement('div');
                item.className = 'rank-item';
                let title = rankTitles[idx] || "路人";
                let tClass = titleClass[idx] || "";
                item.innerHTML = `第${idx+1}名 <span class="${tClass}">【${title}】</span>：${p.name} — ${p.smoothRate}% | ${p.smoothReason}`;
                box.appendChild(item);
            });
        }
        function renderTeam(res){
            document.getElementById('raidDungeon').innerText = '本次挑战副本：'+getFinalDungeon();
            let all = [...res.tank,...res.healer,...res.dps,...res.ranged];
            function renderLine(id, list, roleName){
                let el = document.getElementById(id);
                el.innerHTML = '';
                list.forEach(p=>{
                    let li = document.createElement('li');
                    li.className = 'player-item';
                    let colorClass = p.smoothRate >=70 ? 'smooth-high' : p.smoothRate >=40 ? 'smooth-mid' : 'smooth-low';
                    li.innerHTML = `
                        <span>${p.name}</span>
                        <span>主职：${p.mainText} ｜ 副职：${p.subText}</span>
                        <span>转职目标：${roleName}（${p.newJob}）</span>
                        <span class="${colorClass}">LaGeshi通畅度预测：${p.smoothRate}%</span>
                        <span>分析：${p.smoothReason}</span>
                    `;
                    el.appendChild(li);
                });
            }
            renderLine('tankList',res.tank,'防护');
            renderLine('healerList',res.healer,'治疗');
            renderLine('meleeList',res.dps,'近战DPS');
            renderLine('rangedList',res.ranged,'远程DPS');
            renderRank(all);
            document.getElementById('teamResult').style.display='block';
        }
        function collectPlayers() {
            let ps = [];
            for(let i=1;i<=8;i++){
                let name = document.getElementById(`p${i}Name`).value.trim();
                let main = document.getElementById(`p${i}Main`).value;
                let sub = document.getElementById(`p${i}Sub`).value;
                if(!name || !main) return null;
                ps.push({name,mainType:main,subType:sub});
            }
            return ps;
        }
        function resetAll(){
            localStorage.removeItem(INPUT_KEY);
            document.getElementById('dungeonSelect').value = '';
            for(let i=1;i<=8;i++){
                document.getElementById(`p${i}Name`).value='';
                document.getElementById(`p${i}Main`).value='';
                document.getElementById(`p${i}Sub`).value='';
            }
            document.getElementById('errorTip').style.display='none';
            document.getElementById('teamResult').style.display='none';
            document.getElementById('rankBox').innerHTML = '';
            document.getElementById('previewWrap').style.display='none';
        }
        // 适配QQ：Blob+预览+长按保存
        function saveAsImageQQCompatible(){
            const wrap = document.getElementById('captureWrap');
            const previewImg = document.getElementById('previewImg');
            const previewWrap = document.getElementById('previewWrap');

            html2canvas(wrap,{
                backgroundColor: "#000000", // 强制黑色背景
                scale: 3, // 提高清晰度
                useCORS: true,
                logging: false
            }).then(canvas=>{
                canvas.toBlob(blob=>{
                    const url = URL.createObjectURL(blob);
                    previewImg.src = url;
                    previewWrap.style.display = 'block';
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'FF14团建队伍分析.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(()=>URL.revokeObjectURL(url), 5000);
                }, 'image/png');
            });
        }
        window.onload = function(){
            loadInputFromLocal();
            bindAutoSave();
            document.getElementById('generateBtn').onclick = ()=>{
                const ps = collectPlayers();
                if(!ps){
                    document.getElementById('errorTip').style.display='block';
                    return;
                }
                document.getElementById('errorTip').style.display='none';
                const teamRes = assignJobs(ps);
                renderTeam(teamRes);
            };
            document.getElementById('resetBtn').onclick = resetAll;
            document.getElementById('saveImgBtn').onclick = ()=>{
                const ps = collectPlayers();
                if(!ps){
                    document.getElementById('errorTip').style.display='block';
                    return;
                }
                document.getElementById('errorTip').style.display='none';
                const teamRes = assignJobs(ps);
                renderTeam(teamRes);
                setTimeout(saveAsImageQQCompatible, 500);
            };
        };
    </script>
</body>
