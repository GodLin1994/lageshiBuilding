<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>FF14 LaGeshi团队团建生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }
        body {
            background: url("https://picsum.photos/id/1005/1920/1080") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            padding: 10px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            margin-bottom: 10px;
        }
        .header p {
            font-size: 15px;
            color: #e0e0e0;
            line-height: 1.4;
        }
        .section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .section-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
        }
        .raid-dungeon {
            text-align: center;
            font-size: 16px;
            color: #ffd700;

            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,215,0,0.25);
        }
        .dungeon-select-wrap {

            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);

        }

    <script>
        const dungeonList = [
            "艳翼蛇鸟歼殛战","佐拉加歼殛战","泽莲尼娅歼殛战","永恒女王歼殛战",
            "永远之暗悲惶歼殛战","格莱杨拉波尔歼殛战","恩欧歼殛战",
            "M1S","M2S","M3S","M4S","M5S","M6S","M7S","M8S","M9S","M10S","M11S","M12S",
            "巴哈姆特绝境战","究极神兵绝境战","亚历山大绝境战","幻想龙诗绝境战",
            "欧米茄绝境验证战","光暗未来绝境战","妖星乱舞绝境战"
        ];

        const fixedJobs = {
            tank: ['骑士', '战士', '暗黑骑士', '绝枪战士'],
            healer: ['白魔法师', '占星术士', '贤者', '学者'],
            dps_melee: ['武士', '武僧', '忍者', '蝰蛇剑士', '龙骑士', '钐镰客'],
            dps_ranged: ['吟游诗人', '舞者', '机工士','绘灵法师', '黑魔法师', '召唤师', '赤魔法师']
        };

        // 称号对应 1-8 名
        const rankTitles = [
            "喷射战士",
            "螺旋升天式",
            "黄金喷射机",
            "水漫金山",
            "挤牙膏战士",
            "千呼万唤屎出来",
            "憋王之王",
            "铁石心肠"
        ];

        // 主职+副职 双维度计算通畅度（副职为空时默认同主职，无加成）
        function calcSmoothRateWithSub(mainType, subType, toType){
            let baseMin = 0, baseMax = 0;
            let subBonus = 0;
            let reason = "";

            // 副职为空时，默认同主职
            const realSubType = subType || mainType;

            // 基础规则（原逻辑）
            if(mainType === 'tank'){
                if(toType === 'dps'){
                    baseMin = 75; baseMax = 95;
                    reason = "主职防护转输出，基础适配度高";
                }else if(toType === 'healer'){
                    baseMin = 20; baseMax = 45;
                    reason = "主职防护转治疗，手法节奏差异大";
                }else{
                    baseMin = 50; baseMax = 70;
                    reason = "同职能转职，基础适配中等";
                }
            }
            else if(mainType === 'dps'){
                if(toType === 'tank' || toType === 'healer'){
                    baseMin = 15; baseMax = 40;
                    reason = "主职输出转坦/治疗，跨度大基础偏低";
                }else{
                    baseMin = 55; baseMax = 75;
                    reason = "输出内部转职，基础适配中等偏上";
                }
            }
            else if(mainType === 'healer'){
                if(toType === 'tank'){
                    baseMin = 70; baseMax = 90;
                    reason = "主职治疗转防护，大局意识相通";
                }else if(toType === 'dps'){
                    baseMin = 40; baseMax = 65;
                    reason = "主职治疗转输出，节奏变化较大";
                }else{
                    baseMin =  50; baseMax = 70;
                    reason = "同治疗转职，基础适配中等";
                }
            }

            // 副职加成：仅当副职≠主职时生效
            if(realSubType !== mainType){
                if(realSubType === toType){
                    subBonus = Math.floor(Math.random() * 6) + 10;
                    reason += `；副职同为${getTypeText(toType)}，熟练度加持额外加分`;
                }else{
                    subBonus = Math.floor(Math.random() * 4);
                    reason += `；副职为${getTypeText(realSubType)}，小幅辅助适配`;
                }
            }else{
                reason += "；无副职（同主职），仅按主职推算";
            }

            let raw = Math.floor(Math.random() * (baseMax - baseMin + 1)) + baseMin;
            let final = Math.min(100, raw + subBonus);
            return { rate: final, reason };
        }

        function getTypeText(t){
            if(t === 'tank') return '防护';
            if(t === 'healer') return '治疗';
            return 'DPS';
        }

        const INPUT_KEY = "FF14_TEAM_FULL_DATA";

        // 保存全部：昵称/主职/副职/副本
        function saveInputToLocal(){
            let data = {
                dungeon: document.getElementById('dungeonSelect').value,
                players: []
            };
            for(let i=1;i<=8;i++){
                data.players.push({
                    name: document.getElementById(`p${i}Name`).value,
                    main: document.getElementById(`p${i}Main`).value,
                    sub: document.getElementById(`p${i}Sub`).value
                });
            }
            localStorage.setItem(INPUT_KEY, JSON.stringify(data));
        }

        // 加载缓存
        function loadInputFromLocal(){
            let d = localStorage.getItem(INPUT_KEY);
            if(!d) return;
            let data = JSON.parse(d);
            document.getElementById('dungeonSelect').value = data.dungeon || '';
            data.players.forEach((p,idx)=>{
                let i = idx+1;
                if(document.getElementById(`p${i}Name`)){
                    document.getElementById(`p${i}Name`).value = p.name || '';
                    document.getElementById(`p${i}Main`).value = p.main || '';
                    document.getElementById(`p${i}Sub`).value = p.sub || '';
                }
            });
        }

        // 自动监听保存
        function bindAutoSave(){
            document.getElementById('dungeonSelect').addEventListener('change', saveInputToLocal);
            for(let i=1;i<=8;i++){
                document.getElementById(`p${i}Name`).addEventListener('input', saveInputToLocal);
                document.getElementById(`p${i}Main`).addEventListener('change', saveInputToLocal);
                document.getElementById(`p${i}Sub`).addEventListener('change', saveInputToLocal);
            }
        }

        function getFinalDungeon(){
            const v = document.getElementById('dungeonSelect').value.trim();
            return v || dungeonList[Math.floor(Math.random() * dungeonList.length)];
        }

        function shuffleArray(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getUniqueFixedJobs(list, count) {
            return shuffleArray(list).slice(0, count);
        }

        function collectPlayers() {
            let ps = [];
            for(let i=1;i<=8;i++){
                let name = document.getElementById(`p${i}Name`).value.trim();
                let main = document.getElementById(`p${i}Main`).value;
                let sub = document.getElementById(`p${i}Sub`).value;
                // 校验：昵称和主职必填
                if(!name || !main) return null;
                ps.push({
                    name,
                    mainType: main,
                    subType: sub // 副职可为空
                });
            }
            return ps;
        }

        function assignJobs(players) {
            const res = {tank:[],healer:[],dps_melee:[],dps_ranged:[]};
            const used = new Set();
            const sp = shuffleArray(players);

            const tj = getUniqueFixedJobs(fixedJobs.tank,2);
            assignToRole('tank',tj,sp,res,used);

            const hj = getUniqueFixedJobs(fixedJobs.healer,2);
            assignToRole('healer',hj,sp,res,used);

            const mj = getUniqueFixedJobs(fixedJobs.dps_melee,2);
            assignToRole('dps_melee',mj,sp,res,used);

            const rj = getUniqueFixedJobs(fixedJobs.dps_ranged,2);
            assignToRole('dps_ranged',rj,sp,res,used);

            return res;
        }

        function assignToRole(roleType, jobList, playerList, res, used){
            let cnt = 0;
            let toType = (roleType === 'tank') ? 'tank'
                        : (roleType === 'healer') ? 'healer' : 'dps';

            let avail = playerList.filter(p => !Object.values(res).flat().some(x=>x.name===p.name));
            let shuffled = shuffleArray(avail);

            for(let job of jobList){
                if(cnt >= jobList.length) break;
                let tar = shuffled.find(p => !used.has(p.name));
                if(tar){
                    tar.newJob = job;
                    tar.newJobType = toType;
                    // 主职+副职双计算（副职为空自动适配）
                    let smooth = calcSmoothRateWithSub(tar.mainType, tar.subType, toType);
                    tar.smoothRate = smooth.rate;
                    tar.smoothReason = smooth.reason;
                    tar.mainText = getTypeText(tar.mainType);
                    tar.subText = tar.subType ? getTypeText(tar.subType) : '无（同主职）';

                    res[roleType].push(tar);
                    used.add(tar.name);
                    cnt++;
                }
            }
        }

        // 渲染排行（带称号）
        function renderRank(allPlayer){
            let box = document.getElementById('rankBox');
            box.innerHTML = '';
            let sortList = allPlayer.sort((a,b)=>b.smoothRate - a.smoothRate);
            sortList.forEach((p,idx)=>{
                let item = document.createElement('div');
                item.className = 'rank-item';
                let title = rankTitles[idx] || "路人";
                item.innerHTML = `第${idx+1}名【${title}】：${p.name} — ${p.smoothRate}% | ${p.smoothReason}`;
                box.appendChild(item);
            });
        }

        function renderTeam(res){
            document.getElementById('raidDungeon').innerText = '本次挑战副本：'+getFinalDungeon();
            let all = [...res.tank,...res.healer,...res.dps_melee,...res.dps_ranged];

            function renderLine(id, list, roleName){
                let el = document.getElementById(id);
                el.innerHTML = '';
                list.forEach(p=>{
                    let li = document.createElement('li');
                    li.className = 'player-item';
                    let colorClass = p.smoothRate >=70 ? 'smooth-high' : p.smoothRate >=40 ? 'smooth-mid' : 'smooth-low';
                    li.innerHTML = `
                        <span>${p.name}</span>
                        <span>主职：${p.mainText} ｜ 副职：${p.subText}</span>
                        <span>转职目标：${roleName}（${p.newJob}）</span>
                        <span class="${colorClass}">LaGeshi通畅度预测：${p.smoothRate}%</span>
                        <span>分析：${p.smoothReason}</span>
                    `;
                    el.appendChild(li);
                });
            }

            renderLine('tankList',res.tank,'防护');
            renderLine('healerList',res.healer,'治疗');
            renderLine('meleeList',res.dps_melee,'近战DPS');
            renderLine('rangedList',res.dps_ranged,'远程DPS');

            renderRank(all);
        }

        function resetAll(){
            localStorage.removeItem(INPUT_KEY);
            document.getElementById('dungeonSelect').value = '';
            for(let i=1;i<=8;i++){
                document.getElementById(`p${i}Name`).value='';
                document.getElementById(`p${i}Main`).value='';
                document.getElementById(`p${i}Sub`).value='';
            }
            document.getElementById('errorTip').style.display='none';
            document.getElementById('teamResult').style.display='none';
            document.getElementById('rankBox').innerHTML = '';
        }

        window.onload = function(){
            loadInputFromLocal();
            bindAutoSave();

            document.getElementById('generateBtn').onclick = ()=>{
                const ps = collectPlayers();
                if(!ps){
                    document.getElementById('errorTip').style.display='block';
                    return;
                }
                document.getElementById('errorTip').style.display='none';
                const teamRes = assignJobs(ps);
                renderTeam(teamRes);
                document.getElementById('teamResult').style.display='block';
            };

            document.getElementById('resetBtn').onclick = resetAll;
        };
    </script>
</body>
</html>
